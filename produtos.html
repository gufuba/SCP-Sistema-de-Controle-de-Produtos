<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP — Produtos</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="layout">

  <div id="sidebar-container"></div>

  <main class="main-content">

    <div class="page-header">
      <h1>Produtos</h1>
      <p>Cadastro e gerenciamento de produtos</p>
    </div>

    <div class="card">
      <div class="card-titulo" id="form-titulo">Novo Produto</div>

      <div class="form-grid">

        <div class="form-grupo">
          <label for="produtoid">Código</label>
          <input type="text" id="produtoid" disabled placeholder="Gerado automaticamente">
        </div>

        <!--
          O select de categorias é preenchido dinamicamente pelo JS,
          buscando as categorias cadastradas no banco.
        -->
        <div class="form-grupo">
          <label for="categoriaprodutoid">Categoria *</label>
          <select id="categoriaprodutoid">
            <option value="">Carregando categorias...</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="ds_produto">Descrição *</label>
          <input type="text" id="ds_produto" placeholder="Nome ou descrição do produto">
        </div>

        <div class="form-grupo">
          <label for="vl_venda_produto">Valor de Venda (R$) *</label>
          <input type="number" id="vl_venda_produto" placeholder="0,00" min="0" step="0.01">
        </div>

        <div class="form-grupo">
          <label for="dt_cadastro_produto">Data de Cadastro *</label>
          <input type="date" id="dt_cadastro_produto">
        </div>

        <div class="form-grupo">
          <label for="status_produto">Status *</label>
          <select id="status_produto">
            <option value="">Selecione...</option>
            <option value="Ativo">Ativo</option>
            <option value="Inativo">Inativo</option>
          </select>
        </div>

        <!-- Observação ocupa a linha inteira — span de 2 colunas via CSS -->
        <div class="form-grupo" style="grid-column: 1 / -1">
          <label for="obs_produto">Observação</label>
          <textarea id="obs_produto" rows="2" placeholder="Informações adicionais (opcional)"
            style="resize: vertical"></textarea>
        </div>

      </div>

      <div class="form-acoes">
        <button class="btn btn-primario" onclick="salvarProduto()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Salvar
        </button>
        <button class="btn btn-secundario" onclick="limparFormulario()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          Limpar
        </button>
      </div>

    </div>

    <!-- Filtro por status acima da tabela -->
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:16px">
        <div class="card-titulo" style="margin-bottom:0; border:none; padding:0">Produtos Cadastrados</div>
        <div style="display:flex; gap:8px; align-items:center">
          <label style="font-size:12px; color:var(--cor-texto-suave); font-weight:500">Filtrar:</label>
          <select id="filtro-status" onchange="carregarProdutos()"
            style="padding:6px 10px; border:1px solid var(--cor-borda); border-radius:var(--raio-borda); font-size:13px; background:var(--cor-fundo-card)">
            <option value="">Todos</option>
            <option value="Ativo">Ativos</option>
            <option value="Inativo">Inativos</option>
          </select>
        </div>
      </div>

      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Categoria</th>
              <th>Descrição</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-produtos">
            <tr><td colspan="6" class="tabela-vazia">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <div class="modal-overlay" id="modal-exclusao">
    <div class="modal">
      <h3>Excluir Produto</h3>
      <p>Tem certeza que deseja excluir este produto? Esta ação não pode ser desfeita.</p>
      <div class="modal-acoes">
        <button class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-perigo" onclick="confirmarExclusao()">Excluir</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/produtos.js"></script>

</body>
</html>
