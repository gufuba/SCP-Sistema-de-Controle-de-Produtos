<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP — Categorias</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="layout">

  <div id="sidebar-container"></div>

  <main class="main-content">

    <div class="page-header">
      <h1>Categorias de Produto</h1>
      <p>Organize os produtos por categoria</p>
    </div>

    <div class="card">
      <div class="card-titulo" id="form-titulo">Nova Categoria</div>

      <div class="form-grid">

        <div class="form-grupo">
          <label for="categoriaprodutoid">Código</label>
          <input type="text" id="categoriaprodutoid" disabled placeholder="Gerado automaticamente">
        </div>

        <div class="form-grupo">
          <label for="ds_categoria_produto">Descrição *</label>
          <input type="text" id="ds_categoria_produto" placeholder="Ex: Informática, Escritório...">
        </div>

      </div>

      <div class="form-acoes">
        <button class="btn btn-primario" onclick="salvarCategoria()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          Salvar
        </button>
        <button class="btn btn-secundario" onclick="limparFormulario()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          Limpar
        </button>
      </div>

    </div>

    <div class="card">
      <div class="card-titulo">Categorias Cadastradas</div>
      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Descrição</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-categorias">
            <tr><td colspan="3" class="tabela-vazia">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <div class="modal-overlay" id="modal-exclusao">
    <div class="modal">
      <h3>Excluir Categoria</h3>
      <p>Tem certeza? Produtos vinculados a esta categoria podem ser afetados.</p>
      <div class="modal-acoes">
        <button class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-perigo" onclick="confirmarExclusao()">Excluir</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/categorias.js"></script>

</body>
</html>
