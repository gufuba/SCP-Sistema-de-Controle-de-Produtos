<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP — Clientes</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="layout">

  <div id="sidebar-container"></div>

  <main class="main-content">

    <div class="page-header">
      <h1>Clientes</h1>
      <p>Cadastro e gerenciamento de clientes</p>
    </div>

    <!-- Tabela de listagem — sempre visível -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:6px;">
        <div class="busca-tabela" style="margin-bottom:0; flex:1;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="busca-clientes" placeholder="Buscar por nome ou CPF/CNPJ..." oninput="filtrarClientes()">
          <button class="busca-limpar" id="busca-clientes-limpar" onclick="limparBusca('clientes')" title="Limpar busca">×</button>
        </div>
        <button class="btn btn-sucesso" onclick="abrirFormulario()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Novo Cliente
        </button>
      </div>
      <div class="busca-resultado" id="busca-clientes-resultado"></div>

      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th class="th-ordenavel" data-coluna="clienteid" onclick="ordenarPor('clienteid')">Código <span class="sort-icon">↕</span></th>
              <th class="th-ordenavel" data-coluna="nome_cliente" onclick="ordenarPor('nome_cliente')">Nome <span class="sort-icon">↕</span></th>
              <th>CPF / CNPJ</th>
              <th>Tipo</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-clientes">
            <tr>
              <td colspan="5" class="tabela-vazia">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal de formulário: Novo / Editar Cliente -->
    <div class="modal-form-overlay" id="modal-formulario">
      <div class="modal-form modal-form-sm">

        <div class="modal-form-header">
          <h2 id="form-titulo">Novo Cliente</h2>
          <button class="modal-form-fechar" onclick="limparFormulario()" title="Fechar">×</button>
        </div>

        <div class="modal-form-body">
          <div class="form-grid">

            <div class="form-grupo">
              <label for="clienteid">Código</label>
              <input type="text" id="clienteid" disabled placeholder="Gerado automaticamente">
            </div>

            <div class="form-grupo">
              <label for="tipo_cliente">Tipo de Cliente *</label>
              <select id="tipo_cliente" onchange="trocarTipoCliente()">
                <option value="">Selecione...</option>
                <option value="F">Pessoa Física</option>
                <option value="J">Pessoa Jurídica</option>
              </select>
            </div>

            <div class="form-grupo">
              <label for="cpf_cnpj_cliente">CPF / CNPJ *</label>
              <input type="text" id="cpf_cnpj_cliente" placeholder="000.000.000-00"
                oninput="mascaraCpfCnpj()" maxlength="18">
            </div>

            <div class="form-grupo">
              <label for="nome_cliente">Nome do Cliente *</label>
              <input type="text" id="nome_cliente" placeholder="Nome completo ou razão social">
            </div>

          </div>

          <div class="form-acoes">
            <button class="btn btn-primario" onclick="salvarCliente()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Salvar
            </button>
            <button class="btn btn-secundario" onclick="limparFormulario()">
              Cancelar
            </button>
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- Modal de confirmação de exclusão -->
  <div class="modal-overlay" id="modal-exclusao">
    <div class="modal">
      <h3>Excluir Cliente</h3>
      <p>Tem certeza que deseja excluir este cliente? Esta ação não pode ser desfeita.</p>
      <div class="modal-acoes">
        <button class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-perigo" onclick="confirmarExclusao()">Excluir</button>
      </div>
    </div>
  </div>

  <!-- Toast de notificação -->
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/clientes.js"></script>

</body>
</html>
