<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCP — Categorias</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="layout">

  <div id="sidebar-container"></div>

  <main class="main-content">

    <div class="page-header">
      <h1>Categorias de Produto</h1>
      <p>Organize os produtos por categoria</p>
    </div>

    <!-- Tabela de listagem — sempre visível -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:6px;">
        <div class="busca-tabela" style="margin-bottom:0; flex:1;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="busca-categorias" placeholder="Buscar por descrição..." oninput="filtrarCategorias()">
          <button class="busca-limpar" id="busca-categorias-limpar" onclick="limparBusca('categorias')" title="Limpar busca">×</button>
        </div>
        <button class="btn btn-sucesso" onclick="abrirFormulario()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nova Categoria
        </button>
      </div>
      <div class="busca-resultado" id="busca-categorias-resultado"></div>

      <div class="tabela-container">
        <table>
          <thead>
            <tr>
              <th class="th-ordenavel" data-coluna="categoriaprodutoid" onclick="ordenarPor('categoriaprodutoid')">Código <span class="sort-icon">↕</span></th>
              <th class="th-ordenavel" data-coluna="ds_categoria_produto" onclick="ordenarPor('ds_categoria_produto')">Descrição <span class="sort-icon">↕</span></th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-categorias">
            <tr><td colspan="3" class="tabela-vazia">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Modal de formulário: Nova / Editar Categoria -->
    <div class="modal-form-overlay" id="modal-formulario">
      <div class="modal-form modal-form-sm">

        <div class="modal-form-header">
          <h2 id="form-titulo">Nova Categoria</h2>
          <button class="modal-form-fechar" onclick="limparFormulario()" title="Fechar">×</button>
        </div>

        <div class="modal-form-body">
          <div class="form-grid">

            <div class="form-grupo">
              <label for="categoriaprodutoid">Código</label>
              <input type="text" id="categoriaprodutoid" disabled placeholder="Gerado automaticamente">
            </div>

            <div class="form-grupo">
              <label for="ds_categoria_produto">Descrição *</label>
              <input type="text" id="ds_categoria_produto" placeholder="Ex: Informática, Escritório...">
            </div>

          </div>

          <div class="form-acoes">
            <button class="btn btn-primario" onclick="salvarCategoria()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              Salvar
            </button>
            <button class="btn btn-secundario" onclick="limparFormulario()">
              Cancelar
            </button>
          </div>
        </div>

      </div>
    </div>

  </main>

  <div class="modal-overlay" id="modal-exclusao">
    <div class="modal">
      <h3>Excluir Categoria</h3>
      <p>Tem certeza? Produtos vinculados a esta categoria podem ser afetados.</p>
      <div class="modal-acoes">
        <button class="btn btn-secundario" onclick="fecharModal()">Cancelar</button>
        <button class="btn btn-perigo" onclick="confirmarExclusao()">Excluir</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/categorias.js"></script>

</body>
</html>
